name: CD

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      deploy:
        description: Run deploy job after publishing the image
        type: boolean
        default: false

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend

jobs:
  test:
    name: API & UI tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start backend
        run: docker compose up -d --build backend

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs backend
          exit 1

      - name: Run API Playwright tests
        run: docker compose --profile test run --rm tests npx playwright test --project=api-functional --project=api-non-functional --project=api-contract

      - name: Reset database for UI tests
        run: |
          docker compose down -v
          docker compose up -d --build backend
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs backend
          exit 1

      - name: Run UI Playwright tests
        run: docker compose --profile test run --rm tests npx playwright test --project=ui

      - name: Tear down
        if: always()
        run: docker compose down -v

  publish:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: publish
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.deploy == 'true'
    environment: production

    steps:
      - name: Deploy placeholder
        run: |
          echo "Image published to ${{ env.BACKEND_IMAGE }}:latest"
          echo ""
          echo "Connect your hosting platform to pull from GHCR, for example:"
          echo "  docker pull ${{ env.BACKEND_IMAGE }}:latest"
          echo "  docker run -p 8000:8000 -e SECRET_KEY=\$SECRET_KEY ${{ env.BACKEND_IMAGE }}:latest"
          echo ""
          echo "Platforms: Railway, Render, Fly.io, Azure Container Apps, AWS ECS, etc."
