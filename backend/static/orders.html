<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders - Bookshop Demo</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header>
    <div class="brand">Bookshop Demo</div>
    <nav>
      <a href="/" data-testid="nav-home">Home</a>
      <a href="/shop" data-testid="nav-shop">Shop</a>
      <a href="/cart" data-testid="nav-cart">Cart</a>
      <a href="/orders" data-testid="nav-orders">Orders</a>
      <button id="nav-logout" data-testid="nav-logout">Logout</button>
    </nav>
  </header>
  <main>
    <h1 data-testid="orders-heading">Your Orders</h1>
    <div id="success-banner" class="alert success hidden" data-testid="order-success">
      Order placed successfully!
    </div>
    <div id="alert" class="alert error hidden" data-testid="orders-alert"></div>
    <div id="orders-list" data-testid="orders-list"></div>
  </main>
  <script src="/static/js/app.js"></script>
  <script>
    if (!isLoggedIn()) {
      window.location.href = "/login";
    }

    const params = new URLSearchParams(window.location.search);
    if (params.get("order")) {
      document.getElementById("success-banner").classList.remove("hidden");
    }

    async function loadOrders() {
      const orders = await api("/api/orders");
      const list = document.getElementById("orders-list");

      if (orders.length === 0) {
        list.innerHTML = '<div class="card"><p>No orders yet.</p></div>';
        return;
      }

      list.innerHTML = orders.map((order) => `
        <div class="card order-card" data-testid="order-card" data-order-id="${order.id}">
          <h3 data-testid="order-id">Order #${order.id}</h3>
          <div class="meta" data-testid="order-meta">
            ${new Date(order.created_at).toLocaleString()} — ${order.status}
          </div>
          <ul>
            ${order.items.map((item) => `
              <li data-testid="order-item">
                ${item.book.title} × ${item.quantity} — ${formatPrice(item.unit_price * item.quantity)}
              </li>
            `).join("")}
          </ul>
          <div class="cart-total" data-testid="order-total">Total: ${formatPrice(order.total)}</div>
        </div>
      `).join("");
    }

    loadOrders().catch((err) => showAlert("alert", err.message));
  </script>
</body>
</html>
