<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Bookshop Demo</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header>
    <div class="brand">Bookshop Demo</div>
    <nav>
      <a href="/" data-testid="nav-home">Home</a>
    </nav>
  </header>
  <main>
    <div class="card">
      <h1 data-testid="login-heading">Login</h1>
      <div id="alert" class="alert error hidden" data-testid="login-alert"></div>
      <form id="login-form">
        <label>
          Email
          <input type="email" id="email" name="email" required data-testid="login-email"
                 value="demo@bookshop.io" autocomplete="username">
        </label>
        <label>
          Password
          <input type="password" id="password" name="password" required data-testid="login-password"
                 value="password123" autocomplete="current-password">
        </label>
        <button type="submit" data-testid="login-submit">Sign In</button>
      </form>
      <p style="margin-top: 1rem; color: var(--muted); font-size: 0.9rem;">
        Demo account: demo@bookshop.io / password123
      </p>
    </div>
  </main>
  <script src="/static/js/app.js"></script>
  <script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      hideAlert("alert");
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      try {
        const data = await api("/api/auth/login", {
          method: "POST",
          body: JSON.stringify({ email, password }),
        });
        setToken(data.access_token);
        window.location.href = "/shop";
      } catch (err) {
        showAlert("alert", err.message === "Unauthorized" ? "Invalid credentials" : err.message);
      }
    });
  </script>
</body>
</html>
