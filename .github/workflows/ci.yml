name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: API & UI tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start backend
        run: docker compose up -d --build --force-recreate backend

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health > /dev/null; then
              echo "Backend is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Backend failed to become healthy"
          docker compose logs backend
          exit 1

      - name: Run API Playwright tests
        run: |
          docker compose --profile test run --rm tests \
            npx playwright test --project=api-functional --project=api-non-functional --project=api-contract

      - name: Reset database for UI tests
        run: |
          docker compose down -v
          docker compose up -d --build --force-recreate backend
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health > /dev/null; then
              echo "Backend is healthy after reset"
              exit 0
            fi
            sleep 2
          done
          docker compose logs backend
          exit 1

      - name: Run UI Playwright tests
        run: |
          docker compose --profile test run --rm \
            -v "${{ github.workspace }}/tests/playwright-report:/tests/playwright-report" \
            -v "${{ github.workspace }}/tests/test-results:/tests/test-results" \
            tests npx playwright test --project=ui

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            tests/playwright-report/
            tests/test-results/
          retention-days: 14

      - name: Tear down
        if: always()
        run: docker compose down -v
